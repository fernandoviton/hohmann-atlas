name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [backend/**]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image hohmann-atlas-api:${{ github.sha }} \
            --file backend/Dockerfile \
            backend/

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name hohmann-atlas-api \
            --resource-group hohmann-atlas-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/hohmann-atlas-api:${{ github.sha }}
