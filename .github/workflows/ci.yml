name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hohmann-test backend/
      - name: Verify API starts without frontend dir
        run: |
          docker run -d --name hohmann -p 8000:8000 hohmann-test
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8000/api/planets; then exit 0; fi
            sleep 2
          done
          docker logs hohmann
          exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test atlas.test.js
