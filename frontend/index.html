<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hohmann Atlas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='10' fill='%23ffcc33'/><ellipse cx='32' cy='32' rx='28' ry='12' fill='none' stroke='%235e9eff' stroke-width='2' transform='rotate(-20 32 32)'/><circle cx='54' cy='24' r='4' fill='%235e9eff'/></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0e17;
    color: #c8d6e5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #f0f4ff;
    margin-bottom: 1rem;
  }
  h1 span { color: #5e9eff; }

  /* Selector */
  .controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  label { font-size: 0.85rem; color: #8899aa; }
  select {
    background: #151b2b;
    color: #e0e8f0;
    border: 1px solid #2a3550;
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    font-size: 0.95rem;
    cursor: pointer;
    outline: none;
  }
  select:hover { border-color: #5e9eff; }

  /* SVG container */
  .diagram-wrap {
    width: 100%;
    max-width: 640px;
    aspect-ratio: 1;
    margin-bottom: 1.5rem;
  }
  svg { width: 100%; height: 100%; }

  /* Orbit rings */
  .orbit-ring {
    fill: none;
    stroke: #1a2540;
    stroke-width: 0.7;
  }
  .orbit-ring.origin-ring { stroke: #2a4570; stroke-width: 1; }

  /* Planet dots */
  .planet-dot { cursor: pointer; }
  .planet-label {
    font-size: 3.2px;
    fill: #8899aa;
    text-anchor: middle;
  }
  .planet-label.active { fill: #f0f4ff; font-weight: 600; }

  /* Sun */
  .sun { fill: #ffcc33; }
  .sun-glow { fill: url(#sunGlow); }

  /* Transfer arcs */
  .transfer-arc {
    fill: none;
    stroke-width: 0.8;
    opacity: 0.5;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  .transfer-arc:hover, .transfer-arc.active { opacity: 1; stroke-width: 1.4; }

  /* Spacecraft */
  .spacecraft {
    r: 1;
    fill: #ffffff;
    filter: url(#glow);
  }

  /* Table */
  .table-wrap {
    width: 100%;
    max-width: 820px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #2a3550;
    color: #8899aa;
    font-weight: 500;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  th.num { text-align: right; }
  td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #151b2b;
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr.data-row { cursor: pointer; transition: background 0.2s; }
  tr.data-row:hover { background: #151b2b; }
  tr.data-row.active { background: #1a2540; outline: 1px solid #2a4570; }
  .dv-green { color: #2ecc71; }
  .dv-yellow { color: #f1c40f; }
  .dv-red { color: #e74c3c; }
  .loading { color: #5e9eff; text-align: center; padding: 2rem; }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 2px;
    background: #151b2b;
    border-radius: 6px;
    padding: 2px;
    margin-right: 0.5rem;
  }
  .mode-toggle button {
    background: transparent;
    color: #8899aa;
    border: none;
    border-radius: 4px;
    padding: 0.35rem 0.7rem;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .mode-toggle button.active {
    background: #2a3550;
    color: #f0f4ff;
  }
  .tour-ctrl { display: none; }
  .tour-ctrl.visible { display: flex; align-items: center; }
  input[type="date"] {
    background: #151b2b;
    color: #e0e8f0;
    border: 1px solid #2a3550;
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    font-size: 0.95rem;
    cursor: pointer;
    outline: none;
  }
  input[type="date"]:hover { border-color: #5e9eff; }

  /* Tour table */
  tr.tour-child td:first-child { padding-left: 2rem; }
  tr.tour-child { opacity: 0.8; }
  .expand-arrow {
    display: inline-block;
    width: 1em;
    cursor: pointer;
    transition: transform 0.2s;
    user-select: none;
  }
  .expand-arrow.open { transform: rotate(90deg); }

  /* Play button */
  .play-btn {
    background: #151b2b;
    color: #5e9eff;
    border: 1px solid #2a3550;
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    font-size: 0.8rem;
    cursor: pointer;
    display: none;
  }
  .play-btn.visible { display: inline-block; }
  .play-btn:hover { border-color: #5e9eff; background: #1a2540; }
</style>
</head>
<body>

<h1>Hohmann <span>Atlas</span></h1>

<div class="controls">
  <div class="mode-toggle">
    <button id="mode-transfer" class="active">Transfers</button>
    <button id="mode-tour">Tour</button>
  </div>
  <label for="origin-select">Origin</label>
  <select id="origin-select"><option value="">Loading…</option></select>
  <span class="tour-ctrl" id="tour-ctrls">
    <label for="date-input" style="margin-left:0.5rem">Date</label>
    <input type="date" id="date-input" value="2026-06-01" min="2025-01-01" max="2199-12-31" style="margin-left:0.25rem">
    <label for="depth-select" style="margin-left:0.5rem">Depth</label>
    <select id="depth-select" style="margin-left:0.25rem">
      <option value="1">1</option>
      <option value="2" selected>2</option>
    </select>
  </span>
  <button id="play-btn" class="play-btn">&#9654; Play</button>
</div>

<div class="diagram-wrap">
  <svg id="diagram" viewBox="0 0 200 200">
    <defs>
      <radialGradient id="sunGlow">
        <stop offset="0%" stop-color="#ffcc33" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#ffcc33" stop-opacity="0"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="0.6" result="g"/>
        <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="planetGlow">
        <feGaussianBlur stdDeviation="0.4" result="g"/>
        <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="scene" transform="translate(100,100)">
      <circle class="sun-glow" cx="0" cy="0" r="6"/>
      <circle class="sun" cx="0" cy="0" r="2.2"/>
      <g id="orbits"></g>
      <g id="transfers"></g>
      <g id="planets"></g>
      <g id="spacecraft"></g>
    </g>
  </svg>
</div>

<div class="table-wrap">
  <table>
    <thead id="table-head">
      <tr id="transfer-head">
        <th>Destination</th>
        <th class="num">Departure Δv</th>
        <th class="num">Arrival Δv</th>
        <th class="num">Total Δv</th>
        <th class="num">Transfer Time</th>
        <th class="num">Synodic Period</th>
      </tr>
      <tr id="tour-head" style="display:none">
        <th>Destination</th>
        <th class="num">Wait</th>
        <th class="num">Launch</th>
        <th class="num">Transfer Time</th>
        <th class="num">Arrival</th>
        <th class="num">Total Δv</th>
      </tr>
    </thead>
    <tbody id="results"><tr><td colspan="6" class="loading">Select an origin planet</td></tr></tbody>
  </table>
</div>

<script type="module">
import {
  createState, selectedIdx, selectByIdx, clearSelection,
  setMode, setOrigin, setTransfers, setTourData, setPlanets,
  setPositions, setTourDate, setTourDepth, startPlaying, stopPlaying,
  setHoveredIdx, clearHoveredIdx, toggleTourExpand,
  selectChild, getSelectedHops,
  validateAndClampDate, dvColor, dvColorHex, formatTime, auToR,
  getArcItems, getPlaybackData, transferArcPathD, transferPoint,
} from '/static/atlas.js';
import { log } from '/static/debug.js';

const API_BASE = window.__API_BASE || '';
const CX = 0, CY = 0;
const PLANET_COLORS = {
  Mercury: '#a0a0a0', Venus: '#e8c46a', Earth: '#5e9eff',
  Mars: '#e07040', Jupiter: '#d4a56a', Saturn: '#e8d080',
  Uranus: '#80d4d4', Neptune: '#5070e0'
};

let renderPending = false;
const prev = {};

const state = new Proxy(createState(), {
  set(target, key, value) {
    if (target[key] === value) return true;
    log('proxy', 'set', key, value);
    if (!(key in prev)) prev[key] = target[key];
    target[key] = value;
    if (!renderPending) {
      renderPending = true;
      queueMicrotask(() => {
        const changed = { ...prev };
        for (const k in prev) prev[k] = undefined;
        Object.keys(prev).forEach(k => delete prev[k]);
        renderPending = false;
        log('render', 'microtask', Object.keys(changed));
        const onlySelection = Object.keys(changed).every(k => k === 'hoveredIdx');
        if (onlySelection) renderSelection();
        else render();
        if ('tourDate' in changed && 'selectedDest' in changed && state.selectedChildIdx == null && state.mode === 'tour' && state.origin) {
          fetchTour();
        }
      });
    }
    return true;
  },
});

// ─── Render (reads state, updates DOM) ───

function render() {
  log('render', 'full');
  renderControls();
  renderOrbits();
  if (!state.playing) renderArcs();
  renderArrivedCraft();
  renderTable();
  renderSelection();
}

function renderControls() {
  document.getElementById('mode-transfer').classList.toggle('active', state.mode === 'transfer');
  document.getElementById('mode-tour').classList.toggle('active', state.mode === 'tour');
  document.getElementById('tour-ctrls').classList.toggle('visible', state.mode === 'tour');
  document.getElementById('transfer-head').style.display = state.mode === 'transfer' ? '' : 'none';
  document.getElementById('tour-head').style.display = state.mode === 'tour' ? '' : 'none';
  document.getElementById('origin-select').value = state.origin || '';
  document.getElementById('date-input').value = state.tourDate;
  document.getElementById('depth-select').value = state.tourDepth;
}

function renderOrbits() {
  const orbG = document.getElementById('orbits');
  const plG = document.getElementById('planets');
  orbG.innerHTML = '';
  plG.innerHTML = '';

  state.planets.forEach((p, i) => {
    const r = auToR(p.semi_major_axis_au);
    const isOrigin = p.name === state.origin;

    const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circ.setAttribute('cx', CX);
    circ.setAttribute('cy', CY);
    circ.setAttribute('r', r);
    circ.setAttribute('class', 'orbit-ring' + (isOrigin ? ' origin-ring' : ''));
    orbG.appendChild(circ);

    let angle = state.positions[p.name] != null
      ? -state.positions[p.name]
      : (i * 0.85 + 0.3) * Math.PI * 2 / 8;
    if (state.arrived) {
      const omega = 2 * Math.PI / p.orbital_period_days;
      angle -= omega * state.arrived.elapsedDays;
    }
    const px = CX + r * Math.cos(angle);
    const py = CY + r * Math.sin(angle);

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'planet-dot');
    g.setAttribute('data-planet', p.name);

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', px);
    dot.setAttribute('cy', py);
    dot.setAttribute('r', isOrigin ? 2 : 1.4);
    dot.setAttribute('fill', PLANET_COLORS[p.name] || '#aaa');
    dot.setAttribute('filter', 'url(#planetGlow)');
    g.appendChild(dot);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', px);
    label.setAttribute('y', py - (isOrigin ? 3.5 : 2.8));
    label.setAttribute('class', 'planet-label' + (isOrigin ? ' active' : ''));
    label.textContent = p.name;
    g.appendChild(label);

    plG.appendChild(g);
  });
}

function renderArcs() {
  const trG = document.getElementById('transfers');
  trG.innerHTML = '';

  // Multi-hop arcs when child is selected
  const hops = getSelectedHops(state);
  if (hops.length === 2 && state.origin) {
    renderMultiHopArcs(trG, hops);
    return;
  }

  const items = getArcItems(state);
  if (!items.length || !state.origin) return;

  const originPlanet = state.planets.find(p => p.name === state.origin);
  if (!originPlanet) return;
  const r1 = originPlanet.semi_major_axis_au;
  const originAngle = state.positions[state.origin] != null ? -state.positions[state.origin] : 0;

  items.forEach((item, i) => {
    const destPlanet = state.planets.find(p => p.name === item.dest);
    if (!destPlanet) return;
    const r2 = destPlanet.semi_major_axis_au;

    const destAngle = state.positions[item.dest] != null ? -state.positions[item.dest] : 0;
    const omega = 2 * Math.PI / destPlanet.orbital_period_days;
    const destEndAngle = destAngle - omega * item.transferDays;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', transferArcPathD(r1, r2, originAngle, destEndAngle));
    path.setAttribute('class', 'transfer-arc');
    path.setAttribute('stroke', dvColorHex(item.dv));
    path.setAttribute('data-idx', i);
    path.setAttribute('id', `arc-${i}`);
    path.style.strokeDasharray = '3 2';

    path.addEventListener('click', () => selectByIdx(state, i));
    path.addEventListener('mouseenter', () => setHoveredIdx(state, i));
    path.addEventListener('mouseleave', () => clearHoveredIdx(state));

    trG.appendChild(path);
  });
}

function renderArrivedCraft() {
  const scG = document.getElementById('spacecraft');
  scG.innerHTML = '';
  if (!state.arrived) return;
  const planet = state.planets.find(p => p.name === state.arrived.destName);
  if (!planet) return;
  let angle = state.positions[state.arrived.destName] != null ? -state.positions[state.arrived.destName] : 0;
  const omega = 2 * Math.PI / planet.orbital_period_days;
  angle -= omega * state.arrived.elapsedDays;
  const r = auToR(planet.semi_major_axis_au);
  const craft = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  craft.setAttribute('cx', r * Math.cos(angle));
  craft.setAttribute('cy', r * Math.sin(angle));
  craft.setAttribute('r', '1.2');
  craft.setAttribute('fill', '#fff');
  craft.setAttribute('filter', 'url(#glow)');
  scG.appendChild(craft);
}

function renderMultiHopArcs(trG, hops) {
  const hop1 = hops[0], hop2 = hops[1];

  const originPlanet = state.planets.find(p => p.name === hop1.originName);
  const intermediatePlanet = state.planets.find(p => p.name === hop1.destName);
  const destPlanet = state.planets.find(p => p.name === hop2.destName);
  if (!originPlanet || !intermediatePlanet || !destPlanet) return;

  const r1 = originPlanet.semi_major_axis_au;
  const rMid = intermediatePlanet.semi_major_axis_au;
  const r2 = destPlanet.semi_major_axis_au;

  const originAngle = state.positions[hop1.originName] != null ? -state.positions[hop1.originName] : 0;
  const midAngle = state.positions[hop1.destName] != null ? -state.positions[hop1.destName] : 0;
  const destAngle = state.positions[hop2.destName] != null ? -state.positions[hop2.destName] : 0;

  const omegaMid = 2 * Math.PI / intermediatePlanet.orbital_period_days;
  const omegaDest = 2 * Math.PI / destPlanet.orbital_period_days;

  // Hop 1: origin → intermediate arrival
  const midArrivalAngle = midAngle - omegaMid * hop1.transferDays;
  const path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path1.setAttribute('d', transferArcPathD(r1, rMid, originAngle, midArrivalAngle));
  path1.setAttribute('class', 'transfer-arc active');
  path1.setAttribute('stroke', dvColorHex(hop1.dv));
  path1.style.strokeDasharray = '3 2';
  trG.appendChild(path1);

  // Hop 2: intermediate departure (after wait) → destination
  const midDepartAngle = midArrivalAngle - omegaMid * hop2.waitDaysBeforeHop;
  const totalElapsed = hop1.transferDays + hop2.waitDaysBeforeHop;
  const destEndAngle = destAngle - omegaDest * (totalElapsed + hop2.transferDays);
  const path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path2.setAttribute('d', transferArcPathD(rMid, r2, midDepartAngle, destEndAngle));
  path2.setAttribute('class', 'transfer-arc active');
  path2.setAttribute('stroke', dvColorHex(hop2.dv));
  path2.style.strokeDasharray = '1.5 1.5';
  path2.style.opacity = '0.7';
  trG.appendChild(path2);
}

function renderTable() {
  if (state.mode === 'transfer') renderTransferTable();
  else renderTourTable();
}

function renderTransferTable() {
  const tbody = document.getElementById('results');
  if (!state.transfers.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="loading">Select an origin planet</td></tr>';
    return;
  }
  tbody.innerHTML = state.transfers.map((t, i) => {
    const cls = dvColor(t.delta_v_total_km_s);
    return `<tr class="data-row" data-idx="${i}">
      <td>${t.destination}</td>
      <td class="num">${t.departure_dv_km_s.toFixed(2)} km/s</td>
      <td class="num">${t.arrival_dv_km_s.toFixed(2)} km/s</td>
      <td class="num dv-${cls}">${t.delta_v_total_km_s.toFixed(2)} km/s</td>
      <td class="num">${formatTime(t.transfer_time_days)}</td>
      <td class="num">${formatTime(t.synodic_period_days)}</td>
    </tr>`;
  }).join('');
  wireRowEvents(tbody);
}

function renderTourTable() {
  const tbody = document.getElementById('results');
  if (!state.tourData || !state.tourData.options.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="loading">No tour options</td></tr>';
    return;
  }
  let html = '';
  state.tourData.options.forEach((opt, i) => {
    const w = opt.window;
    const cls = dvColor(w.delta_v_total_km_s);
    const hasChildren = opt.next_options.length > 0;
    const isExpanded = state.expandedTourParents.has(i);
    const arrowCls = 'expand-arrow' + (isExpanded ? ' open' : '');
    const arrow = hasChildren ? '<span class="' + arrowCls + '" data-parent="' + i + '">&#9656;</span>' : '<span style="width:1em;display:inline-block"></span>';
    html += `<tr class="data-row" data-idx="${i}" data-date="${w.launch_date}">
      <td>${arrow} ${w.destination}</td>
      <td class="num">${formatTime(opt.wait_time_days)}</td>
      <td class="num">${w.launch_date}</td>
      <td class="num">${formatTime(w.transfer_time_days)}</td>
      <td class="num">${w.arrival_date}</td>
      <td class="num dv-${cls}">${w.delta_v_total_km_s.toFixed(2)} km/s</td>
    </tr>`;
    if (hasChildren) {
      opt.next_options.forEach((sub, j) => {
        const sw = sub.window;
        const scls = dvColor(sw.delta_v_total_km_s);
        const childDisplay = isExpanded ? '' : 'display:none';
        html += `<tr class="tour-child" data-parent="${i}" data-child-idx="${j}" style="${childDisplay}">
          <td>${sw.destination}</td>
          <td class="num">${formatTime(sub.wait_time_days)}</td>
          <td class="num">${sw.launch_date}</td>
          <td class="num">${formatTime(sw.transfer_time_days)}</td>
          <td class="num">${sw.arrival_date}</td>
          <td class="num dv-${scls}">${sw.delta_v_total_km_s.toFixed(2)} km/s</td>
        </tr>`;
      });
    }
  });
  tbody.innerHTML = html;

  tbody.querySelectorAll('.expand-arrow').forEach(arrow => {
    arrow.addEventListener('click', e => {
      e.stopPropagation();
      toggleTourExpand(state, parseInt(arrow.dataset.parent));
    });
  });
  wireRowEvents(tbody);
}

function wireRowEvents(tbody) {
  const rows = tbody.querySelectorAll('.data-row');
  log('event', 'wired', rows.length, 'rows');
  rows.forEach(row => {
    const idx = parseInt(row.dataset.idx);
    row.addEventListener('click', () => { log('event', 'row-click', idx); selectByIdx(state, idx); });
    row.addEventListener('mouseenter', () => setHoveredIdx(state, idx));
    row.addEventListener('mouseleave', () => clearHoveredIdx(state));
  });
  tbody.querySelectorAll('.tour-child').forEach(row => {
    const parentIdx = parseInt(row.dataset.parent);
    const childIdx = parseInt(row.dataset.childIdx);
    row.addEventListener('click', () => { log('event', 'child-click', parentIdx, childIdx); selectChild(state, parentIdx, childIdx); });
  });
}

function renderSelection() {
  const idx = selectedIdx(state);
  const hov = state.hoveredIdx;
  const childIdx = state.selectedChildIdx;
  log('selection', 'idx', idx, 'hov', hov, 'child', childIdx);
  document.querySelectorAll('.data-row').forEach((r, i) =>
    r.classList.toggle('active', i === idx || i === hov));
  document.querySelectorAll('.tour-child').forEach(r => {
    const pi = parseInt(r.dataset.parent);
    const ci = parseInt(r.dataset.childIdx);
    r.classList.toggle('active', pi === idx && ci === childIdx);
  });
  if (!state.playing) {
    const isMultiHop = state.selectedChildIdx != null && getSelectedHops(state).length === 2;
    document.querySelectorAll('.transfer-arc').forEach((a, i) => {
      if (isMultiHop) return; // multi-hop arcs are already styled by renderMultiHopArcs
      a.classList.toggle('active', i === idx || i === hov);
      a.style.display = idx >= 0 && i !== idx ? 'none' : '';
    });
  }
  document.getElementById('play-btn').classList.toggle('visible', idx >= 0 || childIdx != null);
}

// ─── Data fetching ───

async function fetchPlanets() {
  const resp = await fetch(API_BASE + '/api/planets');
  setPlanets(state, await resp.json());
  const sel = document.getElementById('origin-select');
  sel.innerHTML = '<option value="">— choose —</option>' +
    state.planets.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
  const today = new Date().toISOString().slice(0, 10);
  await fetchPositions(today);
}

async function fetchPositions(date) {
  const resp = await fetch(`${API_BASE}/api/positions?date=${date}`);
  setPositions(state, await resp.json());
}

async function fetchTransfers() {
  if (!state.origin) {
    setTransfers(state, []);
    clearSelection(state);
    return;
  }
  const resp = await fetch(`${API_BASE}/api/transfers/${state.origin}`);
  setTransfers(state, await resp.json());
}

async function fetchTour() {
  if (!state.origin) {
    setTourData(state, null);
    clearSelection(state);
    return;
  }
  await fetchPositions(state.tourDate);
  const resp = await fetch(`${API_BASE}/api/tour/${state.origin}?date=${state.tourDate}&depth=${state.tourDepth}`);
  setTourData(state, await resp.json());
}

// ─── Animation ───

let animId = null;

function doStartPlayback() {
  if (!startPlaying(state)) return;
  state.arrived = null;
  document.getElementById('spacecraft').innerHTML = '';

  const data = getPlaybackData(state);
  if (!data) return;

  if (Array.isArray(data)) {
    doMultiHopPlayback(data);
    return;
  }

  const originPlanet = state.planets.find(p => p.name === data.originName);
  const destPlanet = state.planets.find(p => p.name === data.destName);
  if (!originPlanet || !destPlanet) return;

  const startAngles = {};
  state.planets.forEach(p => {
    startAngles[p.name] = state.positions[p.name] != null ? -state.positions[p.name] : 0;
  });
  const omegas = {};
  state.planets.forEach(p => {
    omegas[p.name] = 2 * Math.PI / p.orbital_period_days;
  });

  const r1 = originPlanet.semi_major_axis_au;
  const r2 = destPlanet.semi_major_axis_au;

  const originAngle = startAngles[data.originName] || 0;
  const destStartAngle = startAngles[data.destName] || 0;
  const destEndAngle = destStartAngle - omegas[data.destName] * data.transferDays;

  const trG = document.getElementById('transfers');
  trG.innerHTML = '';
  const visPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  visPath.setAttribute('d', transferArcPathD(r1, r2, originAngle, destEndAngle));
  visPath.setAttribute('class', 'transfer-arc active');
  visPath.setAttribute('stroke', dvColorHex(data.dv));
  visPath.style.strokeDasharray = '3 2';
  trG.appendChild(visPath);

  const craft = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  craft.setAttribute('r', '1.2');
  craft.setAttribute('fill', '#fff');
  craft.setAttribute('filter', 'url(#glow)');
  trG.appendChild(craft);

  const PLAYBACK_SECS = 5;
  const startTime = performance.now();

  function frame(now) {
    if (!state.playing) { animId = null; return; }
    const t = Math.min((now - startTime) / 1000 / PLAYBACK_SECS, 1);

    const plG = document.getElementById('planets');
    state.planets.forEach((p, i) => {
      const r = auToR(p.semi_major_axis_au);
      const angle = startAngles[p.name] - omegas[p.name] * data.transferDays * t;
      const px = CX + r * Math.cos(angle);
      const py = CY + r * Math.sin(angle);
      const g = plG.children[i];
      if (!g) return;
      const dot = g.querySelector('circle');
      const label = g.querySelector('text');
      if (dot) { dot.setAttribute('cx', px); dot.setAttribute('cy', py); }
      if (label) { label.setAttribute('x', px); label.setAttribute('y', py - 2.8); }
    });

    const pt = transferPoint(r1, r2, originAngle, destEndAngle, t);
    craft.setAttribute('cx', pt.x);
    craft.setAttribute('cy', pt.y);

    if (t < 1) {
      animId = requestAnimationFrame(frame);
    } else {
      animId = null;
      stopPlaying(state, data.destName, data.transferDays);
      render();
    }
  }

  animId = requestAnimationFrame(frame);
}

function doMultiHopPlayback(hops) {
  const hop1 = hops[0], hop2 = hops[1];

  const originPlanet = state.planets.find(p => p.name === hop1.originName);
  const intermediatePlanet = state.planets.find(p => p.name === hop1.destName);
  const destPlanet = state.planets.find(p => p.name === hop2.destName);
  if (!originPlanet || !intermediatePlanet || !destPlanet) return;

  const startAngles = {};
  state.planets.forEach(p => {
    startAngles[p.name] = state.positions[p.name] != null ? -state.positions[p.name] : 0;
  });
  const omegas = {};
  state.planets.forEach(p => {
    omegas[p.name] = 2 * Math.PI / p.orbital_period_days;
  });

  const r1 = originPlanet.semi_major_axis_au;
  const rMid = intermediatePlanet.semi_major_axis_au;
  const r2 = destPlanet.semi_major_axis_au;

  const originAngle = startAngles[hop1.originName] || 0;
  const midStartAngle = startAngles[hop1.destName] || 0;
  const destStartAngle = startAngles[hop2.destName] || 0;

  const waitDays = hop2.waitDaysBeforeHop;
  const totalDays = hop1.transferDays + waitDays + hop2.transferDays;
  const frac1 = hop1.transferDays / totalDays;
  const fracWait = (hop1.transferDays + waitDays) / totalDays;

  // Hop 1 arc endpoints
  const midArrivalAngle = midStartAngle - omegas[hop1.destName] * hop1.transferDays;
  // Hop 2 arc endpoints
  const midDepartAngle = midArrivalAngle - omegas[hop1.destName] * waitDays;
  const totalElapsed = hop1.transferDays + waitDays;
  const destEndAngle = destStartAngle - omegas[hop2.destName] * (totalElapsed + hop2.transferDays);

  const trG = document.getElementById('transfers');
  trG.innerHTML = '';

  // Arc 1
  const path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path1.setAttribute('d', transferArcPathD(r1, rMid, originAngle, midArrivalAngle));
  path1.setAttribute('class', 'transfer-arc active');
  path1.setAttribute('stroke', dvColorHex(hop1.dv));
  path1.style.strokeDasharray = '3 2';
  trG.appendChild(path1);

  // Arc 2
  const path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path2.setAttribute('d', transferArcPathD(rMid, r2, midDepartAngle, destEndAngle));
  path2.setAttribute('class', 'transfer-arc active');
  path2.setAttribute('stroke', dvColorHex(hop2.dv));
  path2.style.strokeDasharray = '1.5 1.5';
  path2.style.opacity = '0.7';
  trG.appendChild(path2);

  // Spacecraft
  const craft = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  craft.setAttribute('r', '1.2');
  craft.setAttribute('fill', '#fff');
  craft.setAttribute('filter', 'url(#glow)');
  trG.appendChild(craft);

  const PLAYBACK_SECS = 5;
  const startTime = performance.now();

  function frame(now) {
    if (!state.playing) { animId = null; return; }
    const t = Math.min((now - startTime) / 1000 / PLAYBACK_SECS, 1);

    // Move all planets based on totalDays elapsed
    const plG = document.getElementById('planets');
    state.planets.forEach((p, i) => {
      const r = auToR(p.semi_major_axis_au);
      const angle = startAngles[p.name] - omegas[p.name] * totalDays * t;
      const px = CX + r * Math.cos(angle);
      const py = CY + r * Math.sin(angle);
      const g = plG.children[i];
      if (!g) return;
      const dot = g.querySelector('circle');
      const label = g.querySelector('text');
      if (dot) { dot.setAttribute('cx', px); dot.setAttribute('cy', py); }
      if (label) { label.setAttribute('x', px); label.setAttribute('y', py - 2.8); }
    });

    // Position spacecraft
    if (t <= frac1) {
      // Hop 1: on arc 1
      const localT = t / frac1;
      const pt = transferPoint(r1, rMid, originAngle, midArrivalAngle, localT);
      craft.setAttribute('cx', pt.x);
      craft.setAttribute('cy', pt.y);
    } else if (t <= fracWait) {
      // Waiting at intermediate planet — follow its orbit
      const currentMidAngle = midStartAngle - omegas[hop1.destName] * totalDays * t;
      const screenRMid = auToR(rMid);
      const px = screenRMid * Math.cos(currentMidAngle);
      const py = screenRMid * Math.sin(currentMidAngle);
      craft.setAttribute('cx', px);
      craft.setAttribute('cy', py);
    } else {
      // Hop 2: on arc 2
      const localT = (t - fracWait) / (1 - fracWait);
      const pt = transferPoint(rMid, r2, midDepartAngle, destEndAngle, localT);
      craft.setAttribute('cx', pt.x);
      craft.setAttribute('cy', pt.y);
    }

    if (t < 1) {
      animId = requestAnimationFrame(frame);
    } else {
      animId = null;
      stopPlaying(state, hop2.destName, totalDays);
      render();
    }
  }

  animId = requestAnimationFrame(frame);
}

// ─── Date validation (DOM wrapper) ───

function validateDate() {
  const input = document.getElementById('date-input');
  const clamped = validateAndClampDate(input.value);
  input.value = clamped;
  return clamped;
}

// ─── Event wiring ───

document.getElementById('mode-transfer').addEventListener('click', () => {
  setMode(state, 'transfer');
  if (state.origin) fetchTransfers();
});

document.getElementById('mode-tour').addEventListener('click', () => {
  setMode(state, 'tour');
  setTourDate(state, validateDate());
  if (state.origin) fetchTour();
});

document.getElementById('origin-select').addEventListener('change', e => {
  setOrigin(state, e.target.value);
  if (state.mode === 'transfer') fetchTransfers();
  else fetchTour();
});

document.getElementById('date-input').addEventListener('blur', () => {
  if (state.mode !== 'tour') return;
  setTourDate(state, validateDate());
  fetchTour();
});

document.getElementById('date-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') e.target.blur();
});

document.getElementById('depth-select').addEventListener('change', () => {
  if (state.mode !== 'tour') return;
  setTourDepth(state, parseInt(document.getElementById('depth-select').value));
  fetchTour();
});

document.getElementById('play-btn').addEventListener('click', doStartPlayback);

document.addEventListener('click', e => {
  if (selectedIdx(state) < 0) return;
  // Use composedPath() — e.target may be detached by a render microtask
  // that ran between the row click handler and this document handler.
  const path = e.composedPath();
  const inside = path.some(el => el.classList && (
    el.classList.contains('table-wrap') || el.classList.contains('diagram-wrap') || el.classList.contains('controls')
  ));
  if (!inside) clearSelection(state);
});

fetchPlanets();
</script>
